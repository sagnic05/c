<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#050508" />
            <stop offset="100%" stop-color="#101420" />
        </linearGradient>

        <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="12" result="blur1" />
            <feGaussianBlur stdDeviation="25" result="blur2" />
            <feMerge>
                <feMergeNode in="blur2" />
                <feMergeNode in="blur1" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <rect width="512" height="512" rx="110" fill="url(#bgGrad)" />
    <rect width="504" height="504" x="4" y="4" rx="106" fill="none" stroke="#00f3ff" stroke-width="4" stroke-opacity="0.3" />

    <rect width="380" height="380" x="66" y="66" rx="40" fill="#020205" stroke="#00ffcc" stroke-width="8" filter="url(#neonGlow)" stroke-opacity="0.6" />

    <circle cx="106" cy="106" r="10" fill="#ff0055" />
    <circle cx="136" cy="106" r="10" fill="#ffbb00" />
    <circle cx="166" cy="106" r="10" fill="#00ff66" />

    <g filter="url(#neonGlow)">
        <path d="M 230 210 C 170 210 150 256 150 286 C 150 316 170 362 230 362" fill="none" stroke="#00f3ff" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
        
        <path d="M 280 220 L 350 286 L 280 352" fill="none" stroke="#00ffcc" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
        
        <rect x="365" y="336" width="45" height="16" rx="8" fill="#ff00ea" />
    </g>
</svg>
