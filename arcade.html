<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Defender: Bitwise Assault</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Fira+Code:wght@500;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050510;
            overflow: hidden;
            font-family: 'Fira Code', monospace;
            color: #fff;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* --- HUD --- */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .hud-box {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ffff;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            text-shadow: 0 0 5px #00ffff;
            color: #00ffff;
        }

        #health { color: #ff0055; border-color: #ff0055; text-shadow: 0 0 5px #ff0055; box-shadow: 0 0 15px rgba(255, 0, 85, 0.3); }

        /* --- CONTROL CONSOLE --- */
        #console-wrapper {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            background: rgba(10, 15, 30, 0.85);
            border: 2px solid #ff00ff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3);
            backdrop-filter: blur(10px);
            z-index: 10;
            transition: transform 0.1s;
        }

        .error-shake {
            animation: shake 0.3s forwards;
            border-color: #ff0000 !important;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6) !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(-50%); }
            25% { transform: translateX(calc(-50% - 10px)); }
            75% { transform: translateX(calc(-50% + 10px)); }
        }

        #question-display {
            font-size: 1.3rem;
            color: #00ffcc;
            margin-bottom: 15px;
            white-space: pre-wrap;
            border-left: 4px solid #00ffcc;
            padding-left: 15px;
            line-height: 1.5;
        }

        .input-row {
            display: flex;
            align-items: center;
            background: #000;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 10px;
        }

        .prompt { color: #ff00ff; margin-right: 15px; font-weight: bold; }

        #answer-input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Fira Code', monospace;
            font-size: 1.5rem;
            width: 100%;
            outline: none;
        }

        #answer-input:focus { border-bottom: 2px solid #ff00ff; }

        /* --- OVERLAYS --- */
        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .screen-overlay h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            color: #ff0055;
            text-shadow: 0 0 20px #ff0055;
            margin-bottom: 10px;
        }

        .screen-overlay p { font-size: 1.5rem; color: #aaa; margin-bottom: 40px; }

        button.start-btn {
            background: transparent;
            border: 3px solid #00ffff;
            color: #00ffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            padding: 15px 40px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        button.start-btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 30px #00ffff;
        }

        #damage-glitch {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.3);
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.1s;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-box" id="score">SCORE: 0</div>
        <div class="hud-box" id="health">CORE HP: 100%</div>
    </div>

    <div id="damage-glitch"></div>

    <div id="console-wrapper">
        <div id="question-display">Loading logic matrix...</div>
        <div class="input-row">
            <span class="prompt">root@turret:~#</span>
            <input type="text" id="answer-input" autocomplete="off" placeholder="Type output...">
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="screen-overlay" id="start-screen">
        <h1 id="screen-title">BITWISE ASSAULT</h1>
        <p id="screen-desc">Evaluate the C code. Type the exact output. Defend the Core.</p>
        <button class="start-btn" onclick="startGame()">INITIALIZE DEFENSE</button>
    </div>

    <script>
        // --- GAME ENGINE (CANVAS) ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // High-Level C Questions (Bitwise, Pointers, Arrays)
        const qBank = [
            { q: "printf(\"%d\", 5 ^ 3);", a: "6" }, // 101 ^ 011 = 110 (6)
            { q: "printf(\"%d\", 1 << 4);", a: "16" }, // 1 * 2^4
            { q: "int a=10; a &= 3;\nprintf(\"%d\", a);", a: "2" }, // 1010 & 0011 = 0010 (2)
            { q: "printf(\"%d\", 100 >> 2);", a: "25" }, // 100 / 4
            { q: "int x = ~0;\nprintf(\"%d\", x);", a: "-1" }, // All bits 1 is -1 in two's complement
            { q: "char s[] = \"C\";\nprintf(\"%zu\", sizeof(s));", a: "2" }, // Includes null terminator
            { q: "int a[] = {1,2,3};\nprintf(\"%d\", *(a+2));", a: "3" }, // Pointer math
            { q: "printf(\"%d\", 7 | 2);", a: "7" }, // 111 | 010 = 111
            { q: "int x=5, y=5;\nprintf(\"%d\", ++x == y++);", a: "0" }, // 6 == 5 is false (0)
            { q: "int a=2, b=3;\na^=b; b^=a; a^=b;\nprintf(\"%d\", a);", a: "3" } // XOR Swap
        ];

        // Game State Variables
        let isPlaying = false;
        let score = 0;
        let hp = 100;
        let enemies = [];
        let particles = [];
        let lasers = [];
        let currentQ = null;
        let spawnRate = 2000; // ms
        let lastSpawn = 0;
        let gridOffset = 0;

        const elScore = document.getElementById('score');
        const elHealth = document.getElementById('health');
        const elQuestion = document.getElementById('question-display');
        const elInput = document.getElementById('answer-input');
        const elConsole = document.getElementById('console-wrapper');
        const elGlitch = document.getElementById('damage-glitch');
        const startScreen = document.getElementById('start-screen');

        // --- GRAPHICS: Synthwave 3D Grid ---
        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            const vpX = width / 2; // Vanishing point X
            const vpY = height * 0.3; // Vanishing point Y

            // Vertical lines converging
            for (let i = -10; i <= 10; i++) {
                ctx.beginPath();
                ctx.moveTo(vpX, vpY);
                ctx.lineTo(vpX + i * 200, height);
                ctx.stroke();
            }

            // Horizontal lines (simulating Z movement)
            gridOffset += 2;
            if (gridOffset > 40) gridOffset = 0;

            for (let i = 0; i < 20; i++) {
                let yPos = vpY + Math.pow(i, 2.2) + gridOffset * (i * 0.1);
                if (yPos > height) continue;
                ctx.beginPath();
                ctx.moveTo(0, yPos);
                ctx.lineTo(width, yPos);
                ctx.stroke();
            }
        }

        // --- ENTITIES ---
        class Enemy {
            constructor() {
                this.lane = (Math.random() - 0.5) * 2; // -1 to 1
                this.z = 0; // Starts at horizon (vpY)
                this.speed = 0.001 + (score * 0.0001); // Speeds up as score increases
                this.color = '#ff0055';
            }
            update() {
                this.z += this.speed;
                if (this.z >= 1) return true; // Reached player
                return false;
            }
            draw() {
                const vpX = width / 2;
                const vpY = height * 0.3;
                // Map Z to Y coordinate and Scale
                const y = vpY + (height - vpY) * Math.pow(this.z, 2);
                const x = vpX + (this.lane * width * 0.8 * this.z);
                const size = 5 + (50 * this.z);

                ctx.save();
                ctx.translate(x, y);
                // Rotate based on z
                ctx.rotate(this.z * Math.PI * 4);
                
                // Draw glowing diamond
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(0, -size);
                ctx.lineTo(size, 0);
                ctx.lineTo(0, size);
                ctx.lineTo(-size, 0);
                ctx.closePath();
                ctx.fill();
                
                // Inner white core
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 5 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.03;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
                ctx.shadowBlur = 0;
            }
        }

        class Laser {
            constructor(targetX, targetY) {
                this.startX = width / 2;
                this.startY = height;
                this.endX = targetX;
                this.endY = targetY;
                this.life = 10; // Frames to display
            }
            draw() {
                if(this.life <= 0) return;
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 10;
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#00ffff';
                ctx.beginPath();
                ctx.moveTo(this.startX, this.startY);
                ctx.lineTo(this.endX, this.endY);
                ctx.stroke();
                
                // Inner white core
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 4;
                ctx.shadowBlur = 0;
                ctx.stroke();
                this.life--;
            }
        }

        // --- GAME LOGIC ---
        function loadQuestion() {
            currentQ = qBank[Math.floor(Math.random() * qBank.length)];
            elQuestion.innerText = currentQ.q;
            elInput.value = '';
        }

        function checkAnswer() {
            if(!isPlaying) return;
            const ans = elInput.value.trim();
            
            if(ans === currentQ.a) {
                // Correct! Destroy closest enemy
                if(enemies.length > 0) {
                    // Find enemy with largest Z
                    let target = enemies.reduce((prev, current) => (prev.z > current.z) ? prev : current);
                    
                    // Calculate Screen XY for effects
                    const vpX = width / 2;
                    const vpY = height * 0.3;
                    const eY = vpY + (height - vpY) * Math.pow(target.z, 2);
                    const eX = vpX + (target.lane * width * 0.8 * target.z);
                    
                    // Fire Laser & Explode
                    lasers.push(new Laser(eX, eY));
                    for(let i=0; i<30; i++) particles.push(new Particle(eX, eY, target.color));
                    
                    // Remove Enemy
                    enemies = enemies.filter(e => e !== target);
                    
                    score += 10;
                    elScore.innerText = `SCORE: ${score}`;
                    elConsole.style.borderColor = "#00ffcc";
                    elConsole.style.boxShadow = "0 0 30px rgba(0, 255, 204, 0.5)";
                }
                loadQuestion();
            } else {
                // Wrong Answer!
                elConsole.classList.remove('error-shake');
                void elConsole.offsetWidth; // Trigger reflow
                elConsole.classList.add('error-shake');
                elInput.value = '';
            }
            
            // Revert console border color
            setTimeout(() => {
                elConsole.style.borderColor = "#ff00ff";
                elConsole.style.boxShadow = "0 0 30px rgba(255, 0, 255, 0.3)";
            }, 300);
        }

        function takeDamage() {
            hp -= 20;
            elHealth.innerText = `CORE HP: ${hp}%`;
            
            // Glitch Effect
            elGlitch.style.opacity = 1;
            setTimeout(() => { elGlitch.style.opacity = 0; }, 150);
            
            // Screen Shake
            canvas.style.transform = `translate(${(Math.random()-0.5)*20}px, ${(Math.random()-0.5)*20}px)`;
            setTimeout(() => { canvas.style.transform = `translate(0,0)`; }, 100);

            if(hp <= 0) {
                isPlaying = false;
                startScreen.style.display = 'flex';
                document.getElementById('screen-title').innerText = "CORE DESTROYED";
                document.getElementById('screen-desc').innerText = `Final Score: ${score}. System Overrun.`;
                document.querySelector('.start-btn').innerText = "REBOOT SYSTEM";
            }
        }

        function startGame() {
            score = 0;
            hp = 100;
            enemies = [];
            particles = [];
            lasers = [];
            spawnRate = 2500;
            isPlaying = true;
            
            elScore.innerText = `SCORE: 0`;
            elHealth.innerText = `CORE HP: 100%`;
            startScreen.style.display = 'none';
            
            loadQuestion();
            elInput.focus();
            lastSpawn = performance.now();
            requestAnimationFrame(gameLoop);
        }

        // Keep input focused so user doesn't have to click
        window.addEventListener('click', () => { if(isPlaying) elInput.focus(); });
        elInput.addEventListener('blur', () => { if(isPlaying) setTimeout(()=> elInput.focus(), 10); });

        // Handle Enter key
        elInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') checkAnswer();
        });

        // --- MAIN RENDER LOOP ---
        function gameLoop(timestamp) {
            if(!isPlaying) return;

            // Motion blur effect using semi-transparent black
            ctx.fillStyle = 'rgba(5, 5, 16, 0.3)';
            ctx.fillRect(0, 0, width, height);

            drawGrid();

            // Spawn Enemies
            if (timestamp - lastSpawn > spawnRate) {
                enemies.push(new Enemy());
                lastSpawn = timestamp;
                // Increase difficulty
                spawnRate = Math.max(800, spawnRate - 50); 
            }

            // Update & Draw Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (e.update()) {
                    // Enemy hit the player
                    enemies.splice(i, 1);
                    takeDamage();
                } else {
                    e.draw();
                }
            }

            // Draw Lasers
            lasers.forEach((l, index) => {
                l.draw();
                if(l.life <= 0) lasers.splice(index, 1);
            });

            // Update & Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Draw Turret (Bottom Center)
            ctx.fillStyle = '#ff00ff';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff00ff';
            ctx.beginPath();
            ctx.arc(width/2, height, 40, 0, Math.PI, true);
            ctx.fill();
            ctx.shadowBlur = 0;

            requestAnimationFrame(gameLoop);
        }
        
        // Initial Draw to prevent black screen
        ctx.fillStyle = '#050510';
        ctx.fillRect(0,0,width,height);
    </script>
</body>
</html>
